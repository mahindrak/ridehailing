version: "3.9"
services:
  matching-service:
    build: ./services/matching
    ports: ["8001:8001"]
    environment:
      DATABASE_URL: postgresql://ride:ride@postgres:5432/matching
      REDIS_URL: redis://redis:6379

  tracking-service:
    build: ./services/tracking
    ports: ["8002:8002"]

  payments-service:
    build: ./services/payments
    ports: ["8003:8003"]
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ride
      POSTGRES_PASSWORD: ride

  redis:
    image: redis:7-alpine

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports: ["9092:9092"]
